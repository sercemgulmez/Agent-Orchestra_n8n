version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: yemektest
      POSTGRES_USER: yemektest
      POSTGRES_PASSWORD: yemektest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yemektest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-yemektest2024}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: yemektest
      DB_POSTGRESDB_USER: yemektest
      DB_POSTGRESDB_PASSWORD: yemektest
      WEBHOOK_URL: http://localhost:5678
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/home/node/workflows

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://redis:6379
      MOCK_API_URL: http://mock-api:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./main.py:/app/main.py
      - optimizer_cache:/app/cache

  mock-api:
    build:
      context: ./mock_api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  mock-ui:
    build:
      context: ./mock_ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  n8n_data:
  optimizer_cache:
